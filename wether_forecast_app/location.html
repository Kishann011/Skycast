<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast — Location</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-default">
    <header class="site-header">
      <div class="nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-icon" aria-hidden="true">⛅</span>
          SkyCast
        </a>
        <nav class="nav-links" aria-label="Main">
          <a href="index.html">Home</a>
          <a href="calendar.html">Calendar</a>
          <a href="location.html" class="active">Location</a>
          <a href="login.html">Login</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">Weather by your location</h1>
      <div class="panel">
        <div class="location-actions">
          <button type="button" class="btn-primary" id="geo-btn">
            Use my current location
          </button>
        </div>
        <p class="coords" id="coords-line"></p>
        <p class="message" id="loc-error" role="alert"></p>

        <div class="weather-main" id="loc-weather" style="border: none; display: none;">
          <p class="weather-location" id="loc-name"></p>
          <p class="weather-desc" id="loc-desc"></p>
          <img class="weather-icon-big" id="loc-icon" alt="" width="120" height="120" />
          <p class="temp-big" id="loc-temp">—<span class="unit">°C</span></p>
        </div>
        <div class="stats-grid" id="loc-stats" style="margin-top: 1rem; display: none;">
          <div class="stat-item">
            <img class="stat-icon" src="assets/icons/thermometer.svg" alt="" width="36" height="36" />
            <div class="stat-label">Feels like</div>
            <div class="stat-value" id="loc-feels">—</div>
          </div>
          <div class="stat-item">
            <img class="stat-icon" src="assets/icons/humidity.svg" alt="" width="36" height="36" />
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="loc-hum">—</div>
          </div>
          <div class="stat-item">
            <img class="stat-icon" src="assets/icons/air.svg" alt="" width="36" height="36" />
            <div class="stat-label">AQI</div>
            <div class="stat-value" id="loc-aqi">—</div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/location-page.js"></script>
  </body>
</html>
