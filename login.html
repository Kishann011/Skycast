<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyCast — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-default">
    <header class="site-header">
      <div class="nav-inner">
        <a href="index.html" class="brand">
          <span class="brand-icon" aria-hidden="true">⛅</span>
          SkyCast
        </a>
        <nav class="nav-links" aria-label="Main">
          <a href="index.html">Home</a>
          <a href="calendar.html">Calendar</a>
          <a href="location.html">Location</a>
          <a href="login.html" class="active">Login</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">Login</h1>
      <div class="panel login-form">
        <p style="color: var(--text-muted); margin-top: 0;">
          Demo only: credentials are stored in this browser’s local storage.
        </p>
        <form id="login-form" novalidate>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />

          <button type="submit" class="btn-primary" style="width: 100%;">
            Sign in
          </button>
        </form>
        <button type="button" class="btn-primary" id="logout-btn" style="width: 100%; margin-top: 0.75rem; display: none; background: linear-gradient(135deg, #64748b, #475569);">
          Log out
        </button>
        <p class="login-status" id="login-status"></p>
      </div>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
